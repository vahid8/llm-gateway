services:
  gateway:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Default to a persisted SQLite file inside the named volume.
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/gateway.db}
    volumes:
      - gateway_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional Postgres backend. Set DATABASE_URL accordingly and `--profile pg`.
  db:
    image: postgres:16-alpine
    profiles: ["pg"]
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  gateway_data:
  pg_data:
