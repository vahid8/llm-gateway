services:
  gateway:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Default to a persisted SQLite file inside the named volume.
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/gateway.db}
      # Read keys from mounted Docker secrets (files), not env vars — so they
      # never show up in `docker inspect` / the process env. The Doubleword key
      # is wired by default; to mount the others the same way (instead of the
      # inline keys in .env), uncomment them here AND in the `secrets:` blocks
      # below, then drop the matching *_API_KEY line from .env.
      DOUBLEWORD_API_KEY_FILE: /run/secrets/doubleword_key
      # ADMIN_API_KEY_FILE: /run/secrets/admin_key
      # OPENAI_API_KEY_FILE: /run/secrets/openai_key
      # ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_key
      # GEMINI_API_KEY_FILE: /run/secrets/gemini_key
    secrets:
      - doubleword_key
      # - admin_key
      # - openai_key
      # - anthropic_key
      # - gemini_key
    volumes:
      - gateway_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional Postgres backend. Set DATABASE_URL accordingly and `--profile pg`.
  db:
    image: postgres:16-alpine
    profiles: ["pg"]
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  gateway_data:
  pg_data:

secrets:
  # Source of truth is a file on the host. Point <NAME>_KEY_FILE at it (e.g.
  # /home/you/.secrets/<name>.key in your local .env); each defaults to
  # ./secrets/<name>.key for a clean clone. Mounted read-only at
  # /run/secrets/<name>_key inside the container. Only enable the keys you use —
  # an active secret's file must exist at `up` time — by uncommenting the
  # matching pair in the service above plus its entry here.
  doubleword_key:
    file: ${DOUBLEWORD_KEY_FILE:-./secrets/doubleword.key}
  # admin_key:
  #   file: ${ADMIN_KEY_FILE:-./secrets/admin.key}
  # openai_key:
  #   file: ${OPENAI_KEY_FILE:-./secrets/openai.key}
  # anthropic_key:
  #   file: ${ANTHROPIC_KEY_FILE:-./secrets/anthropic.key}
  # gemini_key:
  #   file: ${GEMINI_KEY_FILE:-./secrets/gemini.key}
